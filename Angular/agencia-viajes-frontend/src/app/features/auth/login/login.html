<div class="login-card">
  <h2>Horizontes sin Límites ✈️</h2>
  <p>Ingresa tus credenciales para continuar</p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" formControlName="username" placeholder="Ej: admin_cesar">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" formControlName="password" placeholder="********">
    </div>

    <button type="submit" class="btn-login" [disabled]="loginForm.invalid">Iniciar Sesión</button>
  
  </form>
</div>
